stages:
  - deploy

deploy_production:
  stage: deploy
  tags:
    - proatam-servidor-produccion
  script:
    - echo "Deploy en servidor..."
    - cd /var/www/proatam/public_html
    - git fetch origin
    - git reset --hard origin/main

    # Leer versión actual
    - VERSION=$(grep "APP_VERSION" version.php | grep -oP "\d+\.\d+\.\d+")
    - MAJOR=$(echo $VERSION | cut -d. -f1)
    - MINOR=$(echo $VERSION | cut -d. -f2)
    - PATCH=$(echo $VERSION | cut -d. -f3)

    # Leer el mensaje del último commit
    - COMMIT_MSG=$(git log -1 --pretty=%s)
    - COMMIT_TYPE=$(echo $COMMIT_MSG | cut -d: -f1 | tr '[:upper:]' '[:lower:]')

    # Incrementar según el tipo de commit
    - |
      if [ "$COMMIT_TYPE" = "feat" ]; then
        MINOR=$((MINOR + 1))
        PATCH=0
        echo "Incrementando MINOR por feat"
      elif echo "$COMMIT_TYPE" | grep -qE "^(fix|security|config|refactor|docs)$"; then
        PATCH=$((PATCH + 1))
        echo "Incrementando PATCH por $COMMIT_TYPE"
      else
        echo "Tipo de commit no reconocido, version sin cambios"
      fi

    # Construir nueva versión
    - NEW_VERSION="$MAJOR.$MINOR.$PATCH"
    - TODAY=$(date +%d/%m/%Y)

    # Actualizar version.php en el servidor
    - sed -i "s/APP_VERSION', '[^']*'/APP_VERSION', '$NEW_VERSION'/" version.php
    - sed -i "s/APP_UPDATE', '[^']*'/APP_UPDATE', '$TODAY'/" version.php

    - echo "Versión actualizada a $NEW_VERSION"